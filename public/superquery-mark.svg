<svg width="512" height="512" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SuperQuery Logo Mark</title>
  <desc id="desc">A geometric Q logo mark with a lightning-shaped query tail in red and blue.</desc>
  <defs>
    <linearGradient id="superqueryRed" x1="26" y1="18" x2="96" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4A3D"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="superqueryBlue" x1="92" y1="55" x2="26" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="superqueryBolt" x1="66" y1="58" x2="105" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="softShadow" x="10" y="10" width="105" height="105" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#1D4ED8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- red upper query arc -->
    <path d="M28 58C28 39.225 43.225 24 62 24C80.775 24 96 39.225 96 58"
          stroke="url(#superqueryRed)" stroke-width="14" stroke-linecap="round"/>
    <!-- blue lower query arc -->
    <path d="M96 58C96 76.775 80.775 92 62 92C43.225 92 28 76.775 28 58"
          stroke="url(#superqueryBlue)" stroke-width="14" stroke-linecap="round"/>
    <!-- lightning query tail -->
    <path d="M64 61L104 103L82 82H96L66 55L74 72H57L64 61Z"
          fill="url(#superqueryBolt)"/>
    <!-- small cutout to keep Q open and sharp -->
    <path d="M77 74L93 90L86 92L70 76L77 74Z" fill="white" fill-opacity="0.0"/>
  </g>
</svg>
